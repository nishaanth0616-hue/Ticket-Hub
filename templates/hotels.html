{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4 d-flex align-items-center"><i class="bi bi-building me-2 text-warning"></i> Premium Hotels</h2>
<div class="row g-4">
    {% for hotel in hotels %}
    <div class="col-lg-4 col-md-6">
        <div class="card movie-card route-card h-100 shadow-sm border-0 position-relative">
            <div class="badge bg-warning text-dark position-absolute top-0 end-0 m-2 px-3 py-2" style="border-radius: 20px; z-index: 2;"><i class="bi bi-star-fill"></i> {{ hotel.rating }}</div>
            <div class="position-relative">
                <img src="{{ hotel.image }}" referrerpolicy="no-referrer" class="card-img-top" alt="{{ hotel.name }}" style="height: 250px; object-fit: cover; border-top-left-radius: 20px; border-top-right-radius: 20px;">
            </div>
            <div class="card-body bg-surface">
                <h5 class="card-title fw-bold text-truncate text-white" title="{{ hotel.name }}">{{ hotel.name }}</h5>
                <p class="card-text text-muted mb-2"><i class="bi bi-geo-alt-fill text-danger"></i> <small>{{ hotel.location }}</small></p>
                <div class="d-flex justify-content-between align-items-center border-top border-secondary pt-3">
                    <span class="fw-bold text-warning fs-5">₹{{ hotel.price }} / night</span>
                    <a href="{{ url_for('hotel_booking', hotel_id=hotel.id) }}" class="btn btn-warning text-dark fw-bold rounded-pill px-4">Book Now</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
