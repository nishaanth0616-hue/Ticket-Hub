{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-sm-8 col-12">
        <div class="card shadow-lg border-0 mt-5 auth-card">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold">Login to <span class="text-primary">TicketHub</span></h2>
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" class="form-control" name="email" required placeholder="Enter your email">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required placeholder="Enter password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3 py-2 fw-semibold">Login</button>
                    <div class="text-center">
                        <span class="text-muted">Don't have an account? <a href="{{ url_for('signup') }}" class="text-decoration-none text-primary fw-medium">Sign up here</a></span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
