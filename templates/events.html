{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4 d-flex align-items-center"><i class="bi bi-music-note-beamed me-2 text-warning"></i> Upcoming Events</h2>
<div class="row g-4">
    {% for event in events %}
    <div class="col-lg-4 col-md-6">
        <div class="card movie-card route-card h-100 shadow-sm border-0 position-relative">
            <div class="badge bg-warning text-dark position-absolute top-0 end-0 m-2 px-3 py-2" style="border-radius: 20px; z-index: 2;"><i class="bi bi-calendar-event"></i> {{ event.date }}</div>
            <div class="position-relative">
                <img src="{{ event.image }}" referrerpolicy="no-referrer" class="card-img-top" alt="{{ event.title }}" style="height: 250px; object-fit: cover; border-top-left-radius: 20px; border-top-right-radius: 20px;">
                <div class="position-absolute bottom-0 w-100 p-2" style="background: linear-gradient(transparent, rgba(0,0,0,0.9));">
                    <span class="badge bg-danger rounded-pill">{{ event.category }}</span>
                </div>
            </div>
            <div class="card-body bg-surface">
                <h5 class="card-title fw-bold text-truncate text-white" title="{{ event.title }}">{{ event.title }}</h5>
                <p class="card-text text-muted mb-2"><i class="bi bi-geo-alt-fill text-danger"></i> <small>{{ event.location }}</small></p>
                <p class="card-text text-muted mb-3"><i class="bi bi-clock-fill text-info"></i> <small>{{ event.time }}</small></p>
                <div class="d-flex justify-content-between align-items-center border-top border-secondary pt-3">
                    <span class="fw-bold text-warning fs-5">₹{{ event.price }}</span>
                    <a href="{{ url_for('event_booking', event_id=event.id) }}" class="btn btn-warning text-dark fw-bold rounded-pill px-4">Book Tickets</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
