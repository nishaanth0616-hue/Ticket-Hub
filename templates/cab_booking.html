{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-5 mb-4">
        <div class="card shadow-sm border-0 mb-4 bg-info text-white overflow-hidden" style="border-radius: 20px;">
            <div class="card-body p-4 text-center">
                <i class="bi bi-taxi-front display-1 mb-3"></i>
                <h3 class="fw-bold">{{ cab.provider }}</h3>
                <span class="badge bg-white text-info px-3 py-2 rounded-pill mb-4">{{ cab.type }}</span>
                
                <div class="d-flex justify-content-between align-items-center bg-dark bg-opacity-25 p-3 rounded-4">
                    <div class="text-start">
                        <small class="text-white-50">From</small>
                        <div class="fw-bold">{{ cab.source }}</div>
                    </div>
                    <i class="bi bi-arrow-right"></i>
                    <div class="text-end">
                        <small class="text-white-50">To</small>
                        <div class="fw-bold">{{ cab.destination }}</div>
                    </div>
                </div>
                
                <div class="fs-2 mt-4 fw-bold">₹{{ cab.price }}</div>
            </div>
        </div>
    </div>

    <div class="col-md-7">
        <div class="card shadow-sm border-0 auth-card">
            <div class="card-body p-4">
                <h4 class="mb-4 text-info">Confirm Cab Ride</h4>
                <form method="POST" action="{{ url_for('add_to_cart') }}">
                    <input type="hidden" name="type" value="Cab">
                    <input type="hidden" name="details" value="{{ cab.provider }} ({{ cab.type }}) - {{ cab.source }} to {{ cab.destination }}">
                    <input type="hidden" name="price" value="{{ cab.price }}">
                    <input type="hidden" name="seats" value="1">
                    
                    <div class="mb-3">
                        <label class="form-label text-muted">Pickup Time</label>
                        <input type="time" class="form-control" name="pickup_time" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">Payment Method</label>
                        <select class="form-select">
                            <option>Cash on Ride</option>
                            <option>Wallet</option>
                            <option>Credit/Debit Card</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-info w-100 py-3 rounded-pill fw-bold text-white fs-5">Book Ride Now</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm border-0 mt-4 overflow-hidden" style="border-radius: 20px;">
            <div id="map-container" style="height: 300px;">
                <iframe 
                    width="100%" 
                    height="100%" 
                    style="border:0;" 
                    loading="lazy" 
                    src="https://maps.google.com/maps?saddr={{ cab.source }}&daddr={{ cab.destination }}&t=&z=14&ie=UTF8&iwloc=&output=embed">
                </iframe>
            </div>
        </div>
    </div>
</div>
{% endblock %}
