{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-5 mb-4">
        <div class="card shadow-sm border-0 mb-4 bg-warning text-dark overflow-hidden" style="border-radius: 20px;">
            <img src="{{ hotel.image }}" class="card-img-top" style="height: 300px; object-fit: cover;">
            <div class="card-body">
                <h4 class="mb-3 fw-bold">{{ hotel.name }}</h4>
                <div class="badge bg-dark text-warning mb-3 px-3 py-2 rounded-pill"><i class="bi bi-star-fill"></i> {{ hotel.rating }} Rating</div>
                <p class="text-muted"><i class="bi bi-geo-alt-fill text-danger"></i> {{ hotel.location }}</p>
                <div class="fs-4 mt-3 pt-3 border-top border-dark border-opacity-25 fw-bold">
                    ₹{{ hotel.price }} <small class="text-muted fs-6">/ night</small>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-7">
        <div class="card shadow-sm border-0 auth-card">
            <div class="card-body p-4">
                <h4 class="mb-4 text-warning">Book Your Stay</h4>
                <form method="POST" action="{{ url_for('add_to_cart') }}">
                    <input type="hidden" name="type" value="Hotel">
                    <input type="hidden" name="details" value="{{ hotel.name }} in {{ hotel.location }}">
                    <input type="hidden" name="price" value="{{ hotel.price }}">
                    
                    <div class="mb-3">
                        <label class="form-label text-muted">Check-in Date</label>
                        <input type="date" class="form-control" name="checkin" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Number of Nights</label>
                        <input type="number" class="form-control" name="seats" value="1" min="1" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">Room Type</label>
                        <select class="form-select">
                            <option>Deluxe Room</option>
                            <option>Premium Suite</option>
                            <option>Executive Room</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 py-3 rounded-pill fw-bold text-dark fs-5">Confirm Booking</button>
                </form>
            </div>
        </div>
        
        <div class="card shadow-sm border-0 mt-4 overflow-hidden" style="border-radius: 20px;">
            <div id="map-container" style="height: 250px;">
                <iframe 
                    width="100%" 
                    height="100%" 
                    style="border:0;" 
                    loading="lazy" 
                    src="https://maps.google.com/maps?q={{ hotel.location }} {{ hotel.name }}&t=&z=14&ie=UTF8&iwloc=&output=embed">
                </iframe>
            </div>
        </div>
    </div>
</div>
{% endblock %}
