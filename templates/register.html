{% extends "base.html" %}

{% block title %}Sign Up - TicketBooker{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-primary text-white text-center py-4 border-0">
                    <h3 class="mb-0 fw-bold"><i class="fas fa-user-plus"></i> Create Account</h3>
                    <p class="text-white-50 mb-0 small">Join TicketBooker today</p>
                </div>
                <div class="card-body p-5">
                    <form method="POST" action="{{ url_for('register') }}" novalidate>
                        <!-- Name Field -->
                        <div class="form-floating mb-4">
                            <input type="text" class="form-control" id="username" name="username" placeholder="Full Name" required>
                            <label for="username"><i class="fas fa-user"></i> Full Name</label>
                        </div>

                        <!-- Phone Number Field -->
                        <div class="form-floating mb-4">
                            <input type="tel" class="form-control" id="phone" name="phone" placeholder="Phone Number" pattern="[0-9]{10}" required>
                            <label for="phone"><i class="fas fa-phone"></i> Phone Number</label>
                            <small class="text-muted">Enter 10 digit mobile number</small>
                        </div>

                        <!-- Email Field -->
                        <div class="form-floating mb-4">
                            <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
                            <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                        </div>

                        <!-- Password Field -->
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required minlength="6">
                            <label for="password"><i class="fas fa-lock"></i> Password</label>
                            <small class="text-muted">Minimum 6 characters</small>
                        </div>

                        <!-- Confirm Password Field -->
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required minlength="6">
                            <label for="confirm_password"><i class="fas fa-lock"></i> Confirm Password</label>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid gap-2 mb-3">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">
                                <i class="fas fa-user-check"></i> Create Account
                            </button>
                        </div>
                    </form>

                    <!-- Login Link -->
                    <div class="text-center mt-4 pt-3 border-top">
                        <p class="text-muted mb-0">Already have an account? 
                            <a href="{{ url_for('login') }}" class="text-decoration-none fw-bold text-primary">Login here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
