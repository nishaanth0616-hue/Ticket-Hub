{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-sm-8 col-12">
        <div class="card shadow-lg border-0 mt-5 auth-card">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold">Join <span class="text-primary">TicketHub</span></h2>
                <form method="POST" action="{{ url_for('signup') }}">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" name="name" required placeholder="John Doe">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" name="phone" required placeholder="Your phone number">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" class="form-control" name="email" required placeholder="you@example.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required placeholder="Create a password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3 fw-semibold">Create Account</button>
                    <div class="text-center">
                        <span class="text-muted">Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none text-primary fw-medium">Login here</a></span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
